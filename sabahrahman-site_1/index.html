// ============================================================
// 1. BehavioralTFAL CLASS
// ============================================================
class BehavioralTFAL {
    async analyzeBehavior(targetDecision, sourceContext, engine) {
        const startTime = Date.now();
        const analysisId = 'BTFAL-' + Date.now() + '-' + Math.random().toString(36).substr(2, 9).toUpperCase();
        const featureGroups = [
            { name: 'OWNERSHIP',    neutralize: (d) => ({ ...d, ownership: { owner: 'unassigned', is_explicit: false, owner_clarity_score: 0 } }) },
            { name: 'METRICS',      neutralize: (d) => ({ ...d, success_metrics: [] }) },
            { name: 'ASSUMPTIONS',  neutralize: (d) => ({ ...d, assumptions: [] }) },
            { name: 'FLAGS',        neutralize: (d) => ({ ...d, flags: [{ severity: 'high' }, { severity: 'high' }] }) },
            { name: 'DEPENDENCIES', neutralize: (d) => ({ ...d, dependencies: [] }) },
        ];
        const baselineResult = engine.calculateQualityScore(targetDecision);
        const S0 = baselineResult.score;
        const scoreRange = 10;
        const perturbations = [];
        const deltas = [];
        for (const group of featureGroups) {
            const perturbed = group.neutralize({ ...targetDecision });
            const Si = engine.calculateQualityScore(perturbed).score;
            const delta = S0 - Si;
            perturbations.push({ feature_group: group.name, baseline: S0, perturbed_score: Si, delta });
            deltas.push({ name: group.name, delta, Si });
        }
        const totalImpact = deltas.reduce((sum, d) => sum + Math.abs(d.delta), 0);
        const factors = [];
        if (totalImpact > 0) {
            for (const d of deltas) {
                if (Math.abs(d.delta) > 0) {
                    factors.push({ name: d.name, delta: d.delta, share: Math.abs(d.delta) / totalImpact, Si: d.Si });
                }
            }
        }
        factors.sort((a, b) => Math.abs(b.delta) - Math.abs(a.delta));
        const m = factors.length;
        let S_attr = 0;
        if (m > 1) {
            const H = -factors.reduce((sum, f) => sum + f.share * Math.log2(f.share), 0);
            S_attr = H / Math.log2(m);
        }
        const perturbedScores = deltas.map(d => d.Si);
        const mu = perturbedScores.reduce((a, b) => a + b, 0) / perturbedScores.length;
        const variance = perturbedScores.reduce((sum, s) => sum + Math.pow(s - mu, 2), 0) / perturbedScores.length;
        const sigma = Math.sqrt(variance);
        const S_outcome = 1 - Math.min(1, sigma / Math.max(scoreRange, 1e-9));
        const S_avg = (S_attr + S_outcome) / 2;
        const penalty = Math.max(0.5, 1 - 0.1 * m);
        const C = S_avg * penalty;
        const factor_breakdown = factors.map(f => ({
            factor: f.name,
            attribution: Math.round(f.share * 100) + '%',
            contribution: (f.delta >= 0 ? '+' : '') + f.delta.toFixed(1),
            impact: Math.abs(f.delta) >= 2 ? 'high' : Math.abs(f.delta) >= 1 ? 'medium' : 'low',
            explanation: this._factorExplanation(f.name, f.delta, f.share)
        }));
        const counterfactuals = factors.slice(0, 3).map(f => ({
            scenario: `If ${f.name.toLowerCase()} were fully addressed`,
            explanation: this._counterfactualExplanation(f.name, f.delta),
            predicted_score_change: (f.delta >= 0 ? '+' : '') + f.delta.toFixed(1)
        }));
        const node_count = 1 + factors.length + 1;
        const edge_count = factors.length * 2;
        const topFactor = factors[0];
        const summary = topFactor
            ? `Analysis identified ${factors.length} influential feature group${factors.length !== 1 ? 's' : ''}. ${topFactor.name} is the dominant factor with ${Math.round(topFactor.share * 100)}% attribution. Attribution stability: ${Math.round(S_attr * 100)}% — ${S_attr > 0.7 ? 'well-balanced influence distribution' : S_attr > 0.4 ? 'moderately concentrated' : 'highly concentrated attribution'}. Confidence: ${Math.round(C * 100)}%.`
            : 'No feature groups showed differential influence on this decision score. The score is insensitive to individual feature group removal.';
        return {
            analysis_id: analysisId,
            processing_time_ms: Date.now() - startTime,
            stability_metrics: { attribution_stability: { score: S_attr }, range_normalized_outcome_sensitivity: { score: S_outcome } },
            explanation: { confidence: { score: C }, summary, factor_breakdown, counterfactuals },
            lattice_graph: { node_count, edge_count },
            perturbations
        };
    }
    _factorExplanation(name, delta, share) {
        const pct = Math.round(share * 100);
        const pts = Math.abs(delta).toFixed(1);
        const map = {
            OWNERSHIP: delta > 0 ? `Clear ownership accounts for ${pct}% of total score influence. Removing it reduces score by ${pts} points — ownership is a critical driver.` : `Ownership has low differential impact (${pct}% attribution) in this decision context.`,
            METRICS: delta > 0 ? `Defined success metrics drive ${pct}% of attribution. Without metrics, score drops ${pts} points, indicating strong metric dependency.` : `Metric definition shows low score sensitivity for this decision.`,
            ASSUMPTIONS: delta > 0 ? `Captured assumptions contribute ${pct}% attribution. Removing assumption documentation reduces score by ${pts} points.` : `Assumptions have minimal differential score impact here.`,
            FLAGS: delta > 0 ? `Risk flag status drives ${pct}% of score variation. Active flags are suppressing score by up to ${pts} points.` : `No high-severity flags detected; flag group shows low score sensitivity.`,
            DEPENDENCIES: delta > 0 ? `Dependency mapping contributes ${pct}% attribution. Unmapped dependencies would reduce score by ${pts} points.` : `Dependencies show low differential score impact in this instance.`,
        };
        return map[name] || `Feature group contributes ${pct}% attribution with ${pts} point delta.`;
    }
    _counterfactualExplanation(name, delta) {
        const map = {
            OWNERSHIP: 'Assigning clear, named ownership would eliminate the ownership-driven score gap and satisfy the highest-weight attribution factor.',
            METRICS: 'Defining at least one quantifiable success metric would resolve the metrics gap and directly improve the integrity score.',
            ASSUMPTIONS: 'Explicitly documenting all underlying assumptions reduces epistemic risk and strengthens the decision audit trail.',
            FLAGS: 'Resolving or mitigating flagged risk items would remove the flag-imposed score penalty and improve reliability.',
            DEPENDENCIES: 'Mapping upstream and downstream dependencies explicitly eliminates the dependency-driven uncertainty penalty.',
        };
        return map[name] || `Addressing ${name.toLowerCase()} would change the score by ${Math.abs(delta).toFixed(1)} points.`;
    }
}

// 2. APP STATE
// ============================================================
let btfal = null;
let currentResults = null;
let allDecisions = [];
let filteredDecisions = [];
let currentFilter = 'all';
let searchQuery = '';

const sampleText = `We decided to migrate our infrastructure to AWS by Q3. The team lead Sarah is responsible for the migration. We're assuming our current traffic patterns will remain stable during the transition. I'm worried about the timeline being tight, but we need to proceed given the cost savings of approximately 30% reduction in operational expenses.

We're going with microservices architecture instead of monolithic. This will allow better scalability. The success metric is 99.9% uptime. However, we still need to decide on the specific database solution - that's pending further evaluation.

Moving forward with the new UI framework. Performance improvement target is 40% faster load times. Budget concerns remain but technical benefits are clear. This decision depends on completing the AWS migration first.`;

// ============================================================
// 3. EnhancedDecisionEngine CLASS
// ============================================================
class EnhancedDecisionEngine {
    constructor() {
        this.decisionPatterns = {
            explicit: [
                /(?:decided|choosing|selected|opted for|going with|will use|approved|committed to)\s+(.+?)(?:\.|$|because|since|as|,)/gi,
                /(?:decision|choice)\s*:?\s*(.+?)(?:\.|$|because|since|as)/gi,
                /we\s+(?:will|shall|are going to|plan to)\s+(.+?)(?:\.|$|because|since|as)/gi
            ],
            implied: [
                /(?:moving forward with|proceeding with|implementing|adopting)\s+(.+?)(?:\.|$|because|since|as)/gi,
                /(?:based on|given|considering)\s+(.+?),\s*(?:we|let's|the team)/gi,
                /(?:instead of|rather than|as opposed to)\s+(.+?)(?:\.|$|,)/gi
            ],
            deferred: [
                /(?:need to decide|pending decision|tbd|to be determined|will decide later|postponing|table this)\s*(?:on|about)?\s*(.+?)(?:\.|$)/gi,
                /(?:open question|unresolved|still discussing|pending)\s*(?:about|on)?\s*(.+?)(?:\.|$)/gi
            ]
        };
        this.dependencyPatterns = [
            /(?:depends on|requires|blocked by|waiting for)\s+(.+?)(?:\.|$|,)/gi,
            /(?:after|once)\s+(.+?)(?:is complete|completes|finishes)/gi
        ];
    }

    async extractDecisions(text) {
        const decisions = [];
        const sentences = text.match(/[^.!?]+[.!?]+/g) || [text];

        decisions.push(...this.extractByType('explicit', sentences));
        decisions.push(...this.extractByType('implied', sentences));
        decisions.push(...this.extractByType('deferred', sentences));

        const enrichedPromises = this.enrichDecisions(decisions);
        return await Promise.all(enrichedPromises);
    }

    extractByType(type, sentences) {
        const decisions = [];
        const patterns = this.decisionPatterns[type];

        sentences.forEach((sentence, idx) => {
            patterns.forEach(pattern => {
                let match;
                const regex = new RegExp(pattern);
                while ((match = regex.exec(sentence)) !== null) {
                    if (match[1] && match[1].length > 5) {
                        decisions.push({
                            id: `decision_${Date.now()}_${idx}_${decisions.length}`,
                            type: type,
                            decision_text: match[1].trim(),
                            source_context: sentence.trim(),
                            confidence_score: type === 'explicit' ? 0.8 : type === 'implied' ? 0.6 : 0.4
                        });
                    }
                }
            });
        });

        return decisions;
    }

    enrichDecisions(decisions) {
        const enriched = decisions.map(async (decision) => {
            const ownership = this.extractOwnership(decision.source_context);
            const assumptions = this.extractAssumptions(decision.source_context);
            const metrics = this.extractMetrics(decision.source_context);
            const dependencies = this.extractDependencies(decision.source_context);
            const flags = this.applyRules(decision, ownership);

            const qualityScore = this.calculateQualityScore({
                ownership,
                assumptions,
                metrics,
                flags,
                type: decision.type
            });

            decision.ownership = ownership;
            decision.assumptions = assumptions;
            decision.success_metrics = metrics;
            decision.dependencies = dependencies;
            decision.flags = flags;
            decision.quality_score = qualityScore.score;
            decision.quality_level = qualityScore.level;
            decision.quality_details = qualityScore.details;

            const btfalAnalysis = await this.runBTFALAnalysis(decision);

            return {
                ...decision,
                assumptions,
                ownership,
                success_metrics: metrics,
                dependencies,
                reversibility: {
                    classification: 'reversible',
                    reasoning: 'Decision can be reversed with minimal impact',
                    risk_level: 'low'
                },
                flags,
                quality_score: qualityScore.score,
                quality_level: qualityScore.level,
                quality_details: qualityScore.details,
                btfal_analysis: btfalAnalysis
            };
        });

        return enriched;
    }

    async runBTFALAnalysis(decision) {
        if (!btfal) return null;

        try {
            const targetDecision = {
                decision_text: decision.decision_text,
                type: decision.type,
                source_context: decision.source_context,
                ownership: decision.ownership || { owner: 'unassigned', is_explicit: false },
                assumptions: decision.assumptions || [],
                success_metrics: decision.success_metrics || [],
                dependencies: decision.dependencies || [],
                flags: decision.flags || [],
                quality_score: decision.quality_score,
                quality_level: decision.quality_level,
                quality_details: decision.quality_details
            };

            const result = await btfal.analyzeBehavior(targetDecision, decision.source_context, engine);

            const attrStability = result.stability_metrics.attribution_stability.score;
            const outcomeSensitivity = result.stability_metrics.range_normalized_outcome_sensitivity.score;

            return {
                analysis_id: result.analysis_id,
                processing_time_ms: result.processing_time_ms,
                attribution_stability: Math.round(attrStability * 100),
                outcome_sensitivity: Math.round(outcomeSensitivity * 100),
                confidence: Math.round(result.explanation.confidence.score * 100),
                summary: result.explanation.summary,
                factor_breakdown: result.explanation.factor_breakdown,
                counterfactuals: result.explanation.counterfactuals,
                lattice_graph: result.lattice_graph,
                perturbations: result.perturbations.length
            };
        } catch (error) {
            console.error('B-TFAL analysis failed:', error);
            return null;
        }
    }

    calculateQualityScore(data) {
        let score = 0;
        const details = [];
        const nextSteps = [];

        if (data.ownership && data.ownership.owner !== 'unassigned') {
            score += 3;
            details.push('✓ Clear ownership');
        } else {
            details.push('✗ Missing ownership');
            nextSteps.push({
                priority: 'high',
                action: 'Assign an owner',
                description: 'Identify who is accountable for this decision and its outcomes'
            });
        }

        const metrics = data.metrics || data.success_metrics || [];
        if (metrics.length > 0) {
            score += 3;
            details.push('✓ Success metrics defined');
        } else {
            details.push('✗ No success metrics');
            nextSteps.push({
                priority: 'high',
                action: 'Define success metrics',
                description: 'Establish measurable criteria to evaluate if this decision was successful'
            });
        }

        const assumptions = data.assumptions || [];
        if (assumptions.length > 0) {
            score += 2;
            details.push('✓ Assumptions documented');
            nextSteps.push({
                priority: 'medium',
                action: 'Validate assumptions',
                description: 'Test if the stated assumptions hold true before proceeding'
            });
        } else {
            details.push('✗ No assumptions identified');
            nextSteps.push({
                priority: 'medium',
                action: 'Document assumptions',
                description: 'Identify and record what you\'re assuming to be true for this decision'
            });
        }

        const flags = data.flags || [];
        if (!flags.some(f => f.severity === 'high')) {
            score += 2;
            details.push('✓ No critical issues');
        } else {
            details.push('✗ Has critical issues');
            nextSteps.unshift({
                priority: 'critical',
                action: 'Resolve critical issues',
                description: 'Address high-severity flags before moving forward'
            });
        }

        if (data.type === 'deferred') {
            nextSteps.push({
                priority: 'high',
                action: 'Set decision deadline',
                description: 'Establish a timeframe for making this pending decision'
            });
        }

        if (score >= 8) {
            nextSteps.push({
                priority: 'low',
                action: 'Document and share',
                description: 'Record decision rationale and communicate to stakeholders'
            });
        }

        const level = score >= 8 ? 'high' : score >= 5 ? 'medium' : 'low';

        return { score, level, details, nextSteps };
    }

    extractDependencies(context) {
        const dependencies = [];
        this.dependencyPatterns.forEach(pattern => {
            let match;
            const regex = new RegExp(pattern);
            while ((match = regex.exec(context)) !== null) {
                if (match[1] && match[1].length > 5) {
                    dependencies.push(match[1].trim());
                }
            }
        });
        return dependencies;
    }

    extractAssumptions(context) {
        const assumptions = [];
        const pattern = /(?:assuming|assume|assumption)\s+(.+?)(?:\.|$|,)/gi;
        let match;
        while ((match = pattern.exec(context)) !== null) {
            if (match[1] && match[1].length > 10) {
                assumptions.push({ text: match[1].trim(), type: 'stated', confidence: 0.7 });
            }
        }
        return assumptions;
    }

    extractOwnership(context) {
        const patterns = [
            /(?:owner|responsible|accountable|lead|driving|owned by)\s*:?\s*([A-Z][a-z]+(?:\s+[A-Z][a-z]+)?)/gi,
            /([A-Z][a-z]+(?:\s+[A-Z][a-z]+)?)\s+(?:is|will be)\s+(?:leading|owning|responsible for|accountable)/gi
        ];
        let owner = null;
        patterns.forEach(pattern => {
            let match;
            while ((match = pattern.exec(context)) !== null) {
                if (match[1]) owner = match[1].trim();
            }
        });
        return { owner: owner || 'unassigned', owner_clarity_score: owner ? 8 : 2, is_explicit: !!owner };
    }

    extractMetrics(context) {
        const metrics = [];
        const patterns = [
            /(?:metric|measure|kpi|target|goal|objective)\s*:?\s*(.+?)(?:\.|$)/gi,
            /(?:success|measured by|tracking)\s*:?\s*(.+?)(?:\.|$)/gi,
            /(?:\d+%|\$[\d,]+|\d+\s*(?:users|customers|hours|days|weeks))/gi
        ];
        patterns.forEach(pattern => {
            let match;
            while ((match = pattern.exec(context)) !== null) {
                if (match[1] && match[1].length > 5) {
                    metrics.push({ metric: match[1].trim(), is_quantifiable: /\d/.test(match[1]) });
                } else if (match[0]) {
                    metrics.push({ metric: match[0].trim(), is_quantifiable: true });
                }
            }
        });
        return metrics;
    }

    applyRules(decision, ownership) {
        const flags = [];
        if (ownership.owner_clarity_score < 3) {
            flags.push({
                type: 'ownership_unclear',
                severity: 'high',
                message: 'Decision ownership is not clearly defined'
            });
        }
        return flags;
    }
}

const engine = new EnhancedDecisionEngine();

// ============================================================
// 4. UTILITY
// ============================================================
function escapeHtml(text) {
    const div = document.createElement('div');
    div.textContent = text;
    return div.innerHTML;
}

function showToast(message, type = 'success') {
    const toast = document.createElement('div');
    toast.className = `alert ${type === 'success' ? 'alert-success' : 'alert-error'} fixed top-5 right-5 w-auto max-w-sm z-50 shadow-lg toast-slide`;
    toast.innerHTML = `<span>${message}</span>`;
    document.body.appendChild(toast);
    setTimeout(() => toast.remove(), 3000);
}

function closeDecisionModal() {
    const modal = document.querySelector('dialog.modal-open');
    if (modal) {
        modal.remove();
        document.body.style.overflow = '';
    }
}

// ============================================================
// 5. FILE UPLOAD
// ============================================================
function handleFileUpload(event) {
    const file = event.target.files[0];
    if (!file) return;

    const reader = new FileReader();

    reader.onload = function(e) {
        const content = e.target.result;
        document.getElementById('inputText').value = content;
        showToast(`File "${file.name}" loaded successfully!`, 'success');
    };

    reader.onerror = function() {
        showToast('Error reading file. Please try again.', 'error');
    };

    if (file.type === 'text/plain' || file.name.endsWith('.txt')) {
        reader.readAsText(file);
    } else {
        showToast('File type not fully supported yet. Please paste text manually.', 'error');
        event.target.value = '';
    }
}

// ============================================================
// 6. EXECUTIVE SUMMARY
// ============================================================
function generateExecutiveSummary(decisions) {
    const unassigned = decisions.filter(d => d.ownership.owner === 'unassigned');
    const deferred = decisions.filter(d => d.type === 'deferred');
    const withDeps = decisions.filter(d => d.dependencies.length > 0);
    const lowQuality = decisions.filter(d => d.quality_level === 'low').sort((a, b) => a.quality_score - b.quality_score);

    const priorities = [];

    if (unassigned.length > 0) {
        priorities.push({
            priority: 'critical',
            action: `Assign owners to ${unassigned.length} decision${unassigned.length > 1 ? 's' : ''}`,
            impact: 'Decisions without clear ownership lead to delays and accountability gaps',
            decisions: unassigned.slice(0, 2).map(d => d.decision_text)
        });
    }

    if (deferred.length > 0) {
        priorities.push({
            priority: 'high',
            action: `Resolve ${deferred.length} pending decision${deferred.length > 1 ? 's' : ''}`,
            impact: 'Open decisions create bottlenecks and project uncertainty',
            decisions: deferred.slice(0, 2).map(d => d.decision_text)
        });
    }

    if (lowQuality.length > 0 && priorities.length < 3) {
        priorities.push({
            priority: 'high',
            action: `Improve ${lowQuality.length} low-quality decision${lowQuality.length > 1 ? 's' : ''}`,
            impact: 'Missing metrics and assumptions increase execution risk',
            decisions: lowQuality.slice(0, 2).map(d => d.decision_text)
        });
    }

    if (withDeps.length > 0 && priorities.length < 3) {
        priorities.push({
            priority: 'medium',
            action: `Review ${withDeps.length} decision${withDeps.length > 1 ? 's' : ''} with dependencies`,
            impact: 'Dependencies may block progress - verify critical path',
            decisions: withDeps.slice(0, 2).map(d => d.decision_text)
        });
    }

    if (priorities.length === 0) {
        return `
            <div class="alert alert-success mb-6 slide-up">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z" /></svg>
                <div>
                    <h3 class="font-bold">All Decisions in Good Shape</h3>
                    <div class="text-sm">No critical actions needed — focus on execution</div>
                </div>
            </div>
        `;
    }

    return `
        <div class="alert alert-warning mb-6 slide-up flex-col items-start">
            <div class="flex items-center gap-2 w-full">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z" /></svg>
                <span class="font-bold">Recommended Next Steps</span>
            </div>
            <div class="w-full mt-2 space-y-2">
                ${priorities.map(p => `
                    <div class="flex items-center gap-2">
                        <span class="badge badge-error badge-sm">${p.priority}</span>
                        <span class="text-sm font-semibold">${escapeHtml(p.action)}</span>
                    </div>
                `).join('')}
            </div>
        </div>
    `;
}

// ============================================================
// 7. ANALYZE
// ============================================================
async function analyzeDecisions() {
    const inputText = document.getElementById('inputText').value.trim();
    if (!inputText) return;

    document.getElementById('processingCard').classList.remove('hidden');
    document.getElementById('resultsArea').classList.add('hidden');

    setTimeout(async () => {
        const decisions = await engine.extractDecisions(inputText);

        currentResults = {
            analysis_metadata: {
                timestamp: new Date().toISOString(),
                input_length: inputText.length,
                decisions_extracted: decisions.length,
                processing_version: '2.0.0-enhanced'
            },
            decisions: decisions,
            input_text: inputText
        };

        allDecisions = decisions;
        filteredDecisions = decisions;

        document.getElementById('processingCard').classList.add('hidden');
        displayResults();
        updateSessionInfo();
    }, 1500);
}

// ============================================================
// 8. DISPLAY RESULTS
// ============================================================
function displayResults() {
    document.getElementById('resultsArea').classList.remove('hidden');

    const decisions = filteredDecisions;
    const executiveSummary = generateExecutiveSummary(allDecisions);

    document.getElementById('statsContainer').innerHTML = `
        <div class="mt-12"></div>
        ${executiveSummary}
    `;

    document.getElementById('decisionsContainer').innerHTML = `
        <div class="flex gap-2 flex-wrap items-center mb-4 mt-6">
            <input type="text" class="input input-bordered input-sm flex-1 min-w-48" id="searchInputInline" placeholder="Search decisions..." value="${escapeHtml(searchQuery)}">
            <div class="join">
                <button class="join-item btn btn-sm ${currentFilter === 'all' ? 'btn-primary' : 'btn-ghost'}" data-filter="all">All</button>
                <button class="join-item btn btn-sm ${currentFilter === 'high-quality' ? 'btn-primary' : 'btn-ghost'}" data-filter="high-quality">High Integrity</button>
                <button class="join-item btn btn-sm ${currentFilter === 'needs-attention' ? 'btn-primary' : 'btn-ghost'}" data-filter="needs-attention">Needs Attention</button>
                <button class="join-item btn btn-sm ${currentFilter === 'unassigned' ? 'btn-primary' : 'btn-ghost'}" data-filter="unassigned">Unassigned</button>

        <h3 class="font-bold text-base mb-3">Decisions (${decisions.length})</h3>

// ============================================================
// 9. RENDER TABLE
// ============================================================
function renderDecisionsTable(decisions) {
    if (decisions.length === 0) {
        return `<div class="text-center py-12 text-base-content/50 text-sm">No decisions match the current filter.</div>`;
    }
    return `
        <div class="card bg-base-100 shadow-sm border border-base-200 overflow-hidden">
            <div class="overflow-x-auto">
                <table class="table table-zebra">
                    <thead>
                        <tr>
                            <th>Decision</th>
                            <th>Type</th>
                            <th>Owner</th>
                            <th>Score</th>
                            <th>Status</th>
                        </tr>
                    </thead>
                    <tbody>
                        ${decisions.map((decision, idx) => renderDecisionRow(decision, idx)).join('')}
                    </tbody>
                </table>
            </div>
        </div>
    `;
}

function renderDecisionRow(decision, idx) {
    const typeClass = decision.type === 'explicit' ? 'badge-info' : decision.type === 'implied' ? 'badge-warning' : 'badge-error';
    const qualityClass = decision.quality_level === 'high' ? 'badge-success' : decision.quality_level === 'medium' ? 'badge-warning' : 'badge-error';
    const statusText = decision.quality_level === 'high' ? 'Ready' : decision.quality_level === 'medium' ? 'Review' : 'Needs Work';
    const ownerClass = decision.ownership.owner === 'unassigned' ? 'text-error font-bold' : 'font-semibold';

    return `
        <tr class="hover cursor-pointer" onclick="openDecisionModal(${idx})" data-decision-index="${idx}">
            <td class="max-w-xs">
                <div class="font-semibold text-sm mb-1">${escapeHtml(decision.decision_text)}</div>
                <div class="flex gap-2 items-center flex-wrap mt-1">
                    ${decision.dependencies.length > 0 ? `<span class="text-xs text-base-content/50">${decision.dependencies.length} ${decision.dependencies.length === 1 ? 'dependency' : 'dependencies'}</span>` : ''}
                    ${decision.btfal_analysis ? `<span class="badge badge-primary badge-sm">B-TFAL</span>` : ''}
                </div>
            </td>
            <td><span class="badge ${typeClass} badge-sm">${decision.type}</span></td>
            <td><span class="${ownerClass} text-sm">${decision.ownership.owner === 'unassigned' ? 'UNASSIGNED' : escapeHtml(decision.ownership.owner)}</span></td>
            <td><span class="badge ${qualityClass}">${decision.quality_score}/10</span></td>
            <td><span class="text-sm font-semibold ${decision.quality_level === 'high' ? 'text-success' : decision.quality_level === 'medium' ? 'text-warning' : 'text-error'}">${statusText}</span></td>
        </tr>
    `;
}

// ============================================================
// 12. SEARCH & FILTER
// ============================================================
function handleSearch(e) {
    searchQuery = e.target.value.toLowerCase();
    applyFilters();
}

function applyFilters() {
    let decisions = allDecisions;

    if (searchQuery) {
        decisions = decisions.filter(d =>
            d.decision_text.toLowerCase().includes(searchQuery) ||
            d.source_context.toLowerCase().includes(searchQuery) ||
            d.ownership.owner.toLowerCase().includes(searchQuery)
        );
    }

    if (currentFilter !== 'all') {
        switch (currentFilter) {
            case 'high-quality':
                decisions = decisions.filter(d => d.quality_level === 'high');
                break;
            case 'needs-attention':
                decisions = decisions.filter(d => d.quality_level === 'low');
                break;
            case 'unassigned':
                decisions = decisions.filter(d => d.ownership.owner === 'unassigned');
                break;
        }
    }

    filteredDecisions = decisions;
    displayResults();
}

// 13. SESSION MANAGEMENT
// ============================================================
function saveSession() {
    if (!currentResults) {
        showToast('No analysis to save. Please analyze some decisions first.', 'error');
        return;
    }
    showSaveModal();
}

    const modal = document.createElement('dialog');

    modal.innerHTML = `

            </div>
            <div class="modal-action">

                <button class="btn btn-primary btn-sm" onclick="confirmSaveSession()">Save</button>

        if (inp) { inp.focus(); inp.select(); }
    }, 50);
    modal.addEventListener('close', () => { modal.remove(); });
}

function confirmSaveSession() {
    const sessionName = document.getElementById('sessionNameInput').value.trim();
    if (!sessionName) {
        showToast('Please enter a session name', 'error');
        return;
    }

    const sessions = JSON.parse(localStorage.getItem('decisionSessions') || '{}');
    sessions[sessionName] = {
        ...currentResults,
        saved_at: new Date().toISOString()
    };

    localStorage.setItem('decisionSessions', JSON.stringify(sessions));
    const modal = document.querySelector('dialog.modal-open');
    if (modal) modal.remove();
    showToast(`Session "${sessionName}" saved successfully!`, 'success');
    updateSessionInfo(sessionName);
    refreshSidebar();
}

function loadSession() {
    const sessions = JSON.parse(localStorage.getItem('decisionSessions') || '{}');
    const sessionNames = Object.keys(sessions);

    if (sessionNames.length === 0) {
        showToast('No saved sessions found', 'error');
        return;
    }

    showLoadModal(sessions, sessionNames);
}

function showLoadModal(sessions, sessionNames) {
    sessionNames.sort((a, b) => new Date(sessions[b].saved_at) - new Date(sessions[a].saved_at));

    const modal = document.createElement('dialog');
    modal.className = 'modal modal-open';
    modal.innerHTML = `
        <div class="modal-box max-w-md" onclick="event.stopPropagation()">
            <form method="dialog"><button class="btn btn-sm btn-circle btn-ghost absolute right-2 top-2">✕</button></form>
            <h3 class="font-bold text-lg mb-4">Load Session</h3>
            <div class="space-y-2 max-h-80 overflow-y-auto">
                ${sessionNames.map(name => {
                    const session = sessions[name];
                    const date = new Date(session.saved_at);
                    const dateStr = date.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
                    const decisionsCount = session.decisions.length;
                    return `
                        <div class="card bg-base-200 border border-base-300 cursor-pointer hover:border-primary hover:bg-base-100 transition-all"
                             onclick="loadSessionByName('${escapeHtml(name).replace(/'/g, "\\'")}')">
                            <div class="card-body py-3 px-4">
                                <div class="font-semibold text-sm">${escapeHtml(name)}</div>
                                <div class="text-xs text-base-content/50">${decisionsCount} decision${decisionsCount === 1 ? '' : 's'} &bull; ${dateStr}</div>
                            </div>
                        </div>
                    `;
                }).join('')}
            </div>
        </div>
        <form method="dialog" class="modal-backdrop"><button>close</button></form>
    `;
    document.body.appendChild(modal);
    modal.addEventListener('close', () => { modal.remove(); });
}

function loadSessionByName(sessionName) {
    const sessions = JSON.parse(localStorage.getItem('decisionSessions') || '{}');
    if (!sessions[sessionName]) return;

    currentResults = sessions[sessionName];
    allDecisions = currentResults.decisions;
    filteredDecisions = currentResults.decisions;

    document.getElementById('inputText').value = currentResults.input_text || '';
    const modal = document.querySelector('dialog.modal-open');
    if (modal) modal.remove();
    displayResults();
    updateSessionInfo(sessionName);
    refreshSidebar();
    showToast(`Session "${sessionName}" loaded`, 'success');
}

function updateSessionInfo(name) {
    const info = name ? `Session: ${name}` : `Session: ${new Date().toLocaleString()}`;
    document.getElementById('sessionInfo').textContent = info;
}

// ============================================================
// 14. SIDEBAR
// ============================================================
function refreshSidebar() {
    const sessions = JSON.parse(localStorage.getItem('decisionSessions') || '{}');
    const sessionNames = Object.keys(sessions);
    const sidebarContent = document.getElementById('sidebarContent');

    if (sessionNames.length === 0) {
        sidebarContent.innerHTML = '<p class="text-sm text-base-content/50 text-center py-8 px-4 leading-relaxed">No saved sessions yet. Analyze decisions and save your first session.</p>';
        return;
    }

    sessionNames.sort((a, b) => new Date(sessions[b].saved_at) - new Date(sessions[a].saved_at));

    sidebarContent.innerHTML = sessionNames.map(name => {
        const session = sessions[name];
        const date = new Date(session.saved_at);
        const dateStr = date.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
        const decisionsCount = session.decisions.length;
        const isActive = currentResults && currentResults.saved_at === session.saved_at;

        return `
            <div class="group relative rounded-lg p-3 cursor-pointer hover:bg-base-200 border ${isActive ? 'border-primary bg-primary/5' : 'border-transparent'} hover:border-primary/30 transition-all mb-1" onclick="loadSessionFromSidebar('${escapeHtml(name).replace(/'/g, "\\'")}')">
                <p class="font-semibold text-sm truncate pr-6">${escapeHtml(name)}</p>
                <p class="text-xs text-base-content/50">${decisionsCount} decision${decisionsCount === 1 ? '' : 's'} &bull; ${dateStr}</p>
                <button class="btn btn-ghost btn-xs btn-circle absolute right-2 top-2 opacity-0 group-hover:opacity-100 text-error" onclick="event.stopPropagation(); deleteSession('${escapeHtml(name).replace(/'/g, "\\'")}');" title="Delete session">✕</button>
            </div>
        `;
    }).join('');
}

function deleteSession(sessionName) {
    if (!confirm(`Delete session "${sessionName}"?`)) return;

    const sessions = JSON.parse(localStorage.getItem('decisionSessions') || '{}');
    delete sessions[sessionName];
    localStorage.setItem('decisionSessions', JSON.stringify(sessions));

    refreshSidebar();
    showToast(`Session "${sessionName}" deleted`, 'success');
}

function loadSessionFromSidebar(sessionName) {
    const sessions = JSON.parse(localStorage.getItem('decisionSessions') || '{}');
    if (!sessions[sessionName]) return;

    currentResults = sessions[sessionName];
    allDecisions = currentResults.decisions;
    filteredDecisions = currentResults.decisions;

    document.getElementById('inputText').value = currentResults.input_text || '';
    displayResults();
    updateSessionInfo(sessionName);
    refreshSidebar();
}

// ============================================================
// 15. INIT — script is at bottom of body so DOM is already ready
// ============================================================
btfal = new BehavioralTFAL();
refreshSidebar();
document.getElementById('loadSampleBtn').addEventListener('click', () => {
    document.getElementById('inputText').value = sampleText;
});
document.getElementById('fileUpload').addEventListener('change', handleFileUpload);
document.getElementById('analyzeBtn').addEventListener('click', analyzeDecisions);
document.getElementById('saveSessionBtn').addEventListener('click', saveSession);
document.getElementById('loadSessionBtn').addEventListener('click', loadSession);
</script>
</body>
